name: Build and Publish

# Triggered when release-please merges a release PR and creates a GitHub
# Release. Builds a multi-arch image and pushes it to GHCR with full SemVer
# tags (e.g. 1.2.3, 1.2, 1, latest) plus a sha- tag for traceability.
#
# Can also be triggered manually via workflow_dispatch for ad-hoc builds
# (these receive only sha- and 'edge' tags, not SemVer or latest).
#
# The smoke-test job must pass before the image is pushed. This gates every
# release on a full functional test of the Dockerfile, catching any breakage
# introduced by base-image bumps, npm package updates, or CMD changes.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  smoke-test:
    name: Smoke test before publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (amd64 only for speed)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: mcp-memory-server:pre-release
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: |
          docker run -d \
            --name mcp \
            -p 3000:3000 \
            -v /tmp/mcp-data:/data \
            -e NODE_OPTIONS=--max-old-space-size=256 \
            mcp-memory-server:pre-release

      - name: Wait for server to be ready
        run: |
          echo "Waiting for MCP server..."
          for i in $(seq 1 20); do
            if curl -sf -o /dev/null -X POST http://localhost:3000/mcp \
                -H "Content-Type: application/json" \
                -H "Accept: application/json, text/event-stream" \
                -d '{"jsonrpc":"2.0","id":0,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"healthcheck","version":"1.0"}}}'; then
              echo "Server is ready."
              exit 0
            fi
            echo "  attempt $i/20 — retrying in 2s"
            sleep 2
          done
          echo "Server did not become ready in time."
          docker logs mcp
          exit 1

      - name: Run smoke test
        run: MCP_URL=http://localhost:3000/mcp ./tests/smoke-test.sh

      - name: Print container logs on failure
        if: failure()
        run: docker logs mcp

  build:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: [smoke-test]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            # SemVer tags from the release tag (e.g. v1.2.3 → 1.2.3, 1.2, 1)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref_name, 'v0.') }}
            # 'latest' only on published releases, not manual dispatches
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            # 'edge' on manual dispatches so they are never confused with releases
            type=raw,value=edge,enable=${{ github.event_name == 'workflow_dispatch' }}
            # Always include a sha tag for traceability
            type=sha,format=short,prefix=sha-
          labels: |
            org.opencontainers.image.title=mcp-memory-server
            org.opencontainers.image.description=Persistent shared knowledge graph memory for AI agents over MCP Streamable HTTP
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
