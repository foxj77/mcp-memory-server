name: Release Please

# Runs on every push to main. Reads conventional commits since the last
# release, then creates or updates a release PR that bumps version.txt and
# CHANGELOG.md. Merging the PR creates the GitHub Release and SemVer tag,
# which in turn triggers the publish workflow to build and push the image.

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Create or update release PR
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: .github/release-please-config.json
          manifest-file: .release-please-manifest.json
