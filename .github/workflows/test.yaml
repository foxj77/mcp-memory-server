name: Integration Test

# Builds the image from the current Dockerfile, starts it, and runs the smoke
# test and persistence test against it. Also lints and templates the Helm chart.
# Catches regressions before a release PR is merged.
#
# Jobs:
#   smoke-test        — exercises all 7 MCP tools via the HTTP API
#   persistence-test  — verifies MEMORY_FILE_PATH, volume writes, and restart
#                       survival (catches the class of bug shipped in <v0.2.3)
#   helm-test         — lint, template, and schema validation for the Helm chart

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke-test:
    name: Build and smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (single-arch for speed)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: mcp-memory-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: |
          docker run -d \
            --name mcp \
            -p 3000:3000 \
            -v /tmp/mcp-data:/data \
            -e NODE_OPTIONS=--max-old-space-size=256 \
            mcp-memory-server:ci

      - name: Wait for server to be ready
        run: |
          echo "Waiting for MCP server..."
          for i in $(seq 1 20); do
            if curl -sf -o /dev/null -X POST http://localhost:3000/mcp \
                -H "Content-Type: application/json" \
                -H "Accept: application/json, text/event-stream" \
                -d '{"jsonrpc":"2.0","id":0,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"healthcheck","version":"1.0"}}}'; then
              echo "Server is ready."
              exit 0
            fi
            echo "  attempt $i/20 — retrying in 2s"
            sleep 2
          done
          echo "Server did not become ready in time."
          docker logs mcp
          exit 1

      - name: Run smoke test
        run: MCP_URL=http://localhost:3000/mcp ./tests/smoke-test.sh

      - name: Print container logs on failure
        if: failure()
        run: docker logs mcp

  persistence-test:
    name: Volume persistence test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (single-arch for speed)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: mcp-memory-server:ci
          # Shares the GHA layer cache with the smoke-test job — fast rebuild.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run persistence test
        run: IMAGE=mcp-memory-server:ci ./tests/persistence-test.sh

      - name: Print container logs on failure
        if: failure()
        run: |
          docker logs "$(docker ps -aq --filter name=mcp-persistence)" 2>/dev/null || true

  helm-test:
    name: Helm lint and template
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint chart/

      - name: Template chart (default values)
        run: |
          helm template mcp-memory-server chart/ --namespace test > /tmp/default-render.yaml
          # MEMORY_FILE_PATH must always be set — removing it silently breaks persistence
          grep -q "MEMORY_FILE_PATH" /tmp/default-render.yaml
          grep -q "/data/memory.jsonl" /tmp/default-render.yaml
          echo "MEMORY_FILE_PATH present in rendered Deployment"

      - name: Template chart (custom values)
        run: |
          helm template mcp-memory-server chart/ --namespace test \
            --set image.tag=0.1.0 \
            --set storage.size=5Gi \
            --set storage.storageClassName=fast-ssd \
            --set resources.limits.memory=1Gi \
            --set nodeHeapSizeMb=384 \
            --set service.type=LoadBalancer \
            --set podAnnotations."prometheus\.io/scrape"=true \
            > /dev/null

      - name: Template chart (kagent enabled)
        run: |
          helm template mcp-memory-server chart/ --namespace test \
            --set kagent.enabled=true \
            --set kagent.namespace=kagent \
            --set kagent.serverName=memory-mcp \
            > /tmp/kagent-render.yaml
          # Assert the RemoteMCPServer resource is present with the correct namespace
          grep -q "kind: RemoteMCPServer" /tmp/kagent-render.yaml
          grep -q "namespace: kagent"     /tmp/kagent-render.yaml
          grep -q "name: memory-mcp"      /tmp/kagent-render.yaml
          grep -q "STREAMABLE_HTTP"        /tmp/kagent-render.yaml
          echo "kagent template assertions passed"

      - name: Template chart (kagent disabled — assert no RemoteMCPServer)
        run: |
          helm template mcp-memory-server chart/ --namespace test \
            > /tmp/no-kagent-render.yaml
          if grep -q "kind: RemoteMCPServer" /tmp/no-kagent-render.yaml; then
            echo "RemoteMCPServer should not appear when kagent.enabled=false"
            exit 1
          fi
          echo "RemoteMCPServer correctly absent when kagent disabled"

      - name: Validate schema rejects invalid values
        run: |
          if helm template mcp-memory-server chart/ \
            --set service.type=InvalidType > /dev/null 2>&1; then
            echo "Schema validation should have rejected InvalidType"
            exit 1
          fi
          echo "Schema validation correctly rejected invalid service type"
