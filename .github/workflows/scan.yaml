name: Security Scan

# Scans the published image for CVEs using Trivy.
# Runs after each publish and weekly to catch newly-disclosed vulnerabilities
# in the base image or npm packages even without a new release.

on:
  release:
    types: [published]
  schedule:
    - cron: "0 8 * * 1"   # every Monday at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # required to upload SARIF results to GitHub Security tab

env:
  IMAGE: ghcr.io/${{ github.repository }}:latest

jobs:
  trivy:
    name: Trivy image scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Upload results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
