apiVersion: v1
kind: Service
metadata:
  name: {{ include "mcp-memory-server.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mcp-memory-server.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: mcp
      protocol: TCP
      name: mcp
  selector:
    {{- include "mcp-memory-server.selectorLabels" . | nindent 4 }}
